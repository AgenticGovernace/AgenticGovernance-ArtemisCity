version: 2.1

orbs:
  node: circleci/node@5
  python: circleci/python@2

jobs:
  python-checks:
    docker:
      - image: cimg/python:3.13
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: requirements.txt
      - run:
          name: Install dev dependencies
          command: pip install black isort flake8 mypy pytest bandit safety
      - run:
          name: Check formatting (Black)
          command: black --check .
      - run:
          name: Check import sorting (isort)
          command: isort --check-only .
      - run:
          name: Lint (Flake8)
          command: flake8 . || true
      - run:
          name: Type check (MyPy)
          command: mypy . || true
      - run:
          name: Security scan (Bandit)
          command: bandit -r . -c pyproject.toml || true
      - run:
          name: Run tests
          command: |
            pytest tests/ -v
            status=$?
            if [ "$status" -eq 5 ]; then
              echo "No tests found"
              exit 0
            fi
            exit "$status"

  node-checks:
    docker:
      - image: cimg/node:22.0
    steps:
      - checkout
      - run:
          name: Install MCP server dependencies
          command: cd web/api && npm install
      - run:
          name: Lint MCP server
          command: cd web/api && npm run lint --if-present
      - run:
          name: Build MCP server
          command: cd web/api && npm run build --if-present
      - run:
          name: Test MCP server
          command: cd web/api && npm test --if-present

  secrets-check:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Scan for hardcoded secrets with gitleaks
          command: |
            echo "Installing gitleaks..."
            curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_Linux_x86_64.tar.gz -o gitleaks.tar.gz
            tar -xzf gitleaks.tar.gz gitleaks
            rm gitleaks.tar.gz
            chmod +x gitleaks
            echo "Running gitleaks scan..."
            ./gitleaks detect --source . --no-git

workflows:
  ci:
    jobs:
      - python-checks
      - node-checks
      - secrets-check
