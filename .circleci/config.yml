version: 2.1

orbs:
  node: circleci/node@5
  python: circleci/python@2

jobs:
  python-checks:
    docker:
      - image: cimg/python:3.13
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: requirements.txt
      - run:
          name: Install dev dependencies
          command: pip install black isort flake8 mypy pytest bandit safety
      - run:
          name: Check formatting (Black)
          command: black --check .
      - run:
          name: Check import sorting (isort)
          command: isort --check-only --profile black .
      - run:
          name: Lint (Flake8)
          command: flake8 .
      - run:
          name: Type check (MyPy)
          command: mypy .
      - run:
          name: Security scan (Bandit)
          command: bandit -r . -c pyproject.toml
      - run:
          name: Run tests
          command: |
            if [ -d "tests" ]; then
              pytest tests/ -v
            else
              echo "No tests found"
            fi

  node-checks:
    docker:
      - image: cimg/node:22.0
    steps:
      - checkout
      - run:
          name: Install web API dependencies
          command: cd web/api && npm install
      - run:
          name: Lint web API
          command: cd web/api && npm run lint --if-present
      - run:
          name: Build web API
          command: cd web/api && npm run build --if-present
      - run:
          name: Test web API
          command: cd web/api && npm test --if-present

  secrets-check:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Check for hardcoded secrets
          command: |
            FOUND=0
            for pattern in \
              "API_KEY\\s*[:=]\\s*['\"]?[A-Za-z0-9_\\-]{20,}" \
              "SECRET_KEY\\s*[:=]\\s*['\"]?[A-Za-z0-9_\\-]{20,}" \
              "ACCESS_TOKEN\\s*[:=]\\s*['\"]?[A-Za-z0-9_\\-]{20,}" \
              "TOKEN\\s*[:=]\\s*['\"]?[A-Za-z0-9_\\-]{20,}" \
              "PASSWORD\\s*[:=]\\s*['\"]?[A-Za-z0-9_\\-]{12,}" \
              "CLIENT_SECRET\\s*[:=]\\s*['\"]?[A-Za-z0-9_\\-]{20,}" \
              "PRIVATE_KEY\\s*[:=]\\s*['\"]?-----BEGIN[ A-Z0-9]+PRIVATE KEY-----" \
            ; do
              if grep -rn --include="*.py" --include="*.ts" --include="*.js" --include="*.yml" --include="*.yaml" --include="*.md" \
                -E "$pattern" . \
                --exclude-dir=.git --exclude-dir=node_modules --exclude="*.example" \
                | grep -v "placeholder" | grep -v "your_" | grep -v "<" | grep -v "must be set" | grep -v "ENV_VAR" | grep -v "=xxx"; then
                FOUND=1
              fi
            done
            if [ "$FOUND" -eq 1 ]; then
              echo "WARNING: Potential hardcoded secrets detected. Review the matches above."
              exit 1
            fi
            echo "No hardcoded secrets detected."

workflows:
  ci:
    jobs:
      - python-checks
      - node-checks
      - secrets-check
