version: 2.1

executors:
  py:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/project

autoscaling:
  cancel_unfinished: false

commands:
  restore_pip_cache:
    steps:
      - restore_cache:
          keys:
            - pip-v1-{{ checksum "requirements.txt" }}-{{ checksum "test-requirements.txt" }}
            - pip-v1-{{ checksum "requirements.txt" }}
            - pip-v1-

  save_pip_cache:
    steps:
      - save_cache:
          key: pip-v1-{{ checksum "requirements.txt" }}-{{ checksum "test-requirements.txt" }}
          paths:
            - ~/.cache/pip

jobs:
  build-and-test:
    executor: py
    environment:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - checkout
      - restore_pip_cache
      - run:
          name: Create venv
          command: |
            python -m venv .venv
            . .venv/bin/activate
            python -m pip install -U pip setuptools wheel
      - run:
          name: Install dependencies
          command: |
            . .venv/bin/activate
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
            if [ -f test-requirements.txt ]; then pip install -r test-requirements.txt; fi
      - save_pip_cache
      - run:
          name: Run tests
          command: |
            . .venv/bin/activate
            pytest -q

workflows:
  ci:
    jobs:
      - build-and-test
