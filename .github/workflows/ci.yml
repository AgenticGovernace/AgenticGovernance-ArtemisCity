name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            Pipfile.lock

      - name: Install Pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install Python dependencies
        run: pipenv sync --dev --system

      - name: Compile stable Python entry points
        run: >
          PYTHONPYCACHEPREFIX=/tmp/pycache
          python -m py_compile
          main.py
          integration/*.py
          interface/*.py
          tests/*.py
          tests/integration/*.py

  api:
    name: API checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: web/api

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/api/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Lint API
        if: ${{ hashFiles('web/api/eslint.config.*', 'web/api/.eslintrc*') != '' }}
        run: npm run lint --if-present

      - name: Build API
        run: npm run build --if-present

      - name: Run API tests
        if: ${{ hashFiles('web/api/jest.config.*', 'web/api/vitest.config.*', 'web/api/**/*.test.*', 'web/api/**/*.spec.*') != '' }}
        run: npm test --if-present

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: web/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        if: ${{ hashFiles('web/frontend/eslint.config.*', 'web/frontend/.eslintrc*') != '' }}
        run: npm run lint --if-present

      - name: Build frontend
        run: npm run build --if-present
